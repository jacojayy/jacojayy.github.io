<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Configs</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .header {
            padding: 20px;
            text-align: center;
            background: #161b22;
        }
        .sidebar {
            width: 200px;
            float: left;
            padding: 10px;
            background-color: #161b22;
            height: calc(100vh - 40px);
            overflow: auto;
        }
        .game-list {
            list-style-type: none;
            padding: 0;
        }
        .game-list li {
            padding: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .game-list li:hover {
            background-color: #58a6ff;
        }
        .content {
            margin-left: 220px;
            padding: 20px;
        }
        .card {
            background-color: #161b22;
            margin: 10px 0;
            padding: 15px;
            border-radius: 5px;
        }
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                float: none;
            }
            .content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Game Configs</h1>
        <h2>Star: vX.X.X</h2>
    </div>
    <div class="sidebar">
        <input type="text" id="search" placeholder="Search games..." onkeyup="filterGames()">
        <ul class="game-list" id="gameList">
            <!-- Game list will be populated here -->
        </ul>
    </div>
    <div class="content" id="gameDetails">
        <p>Select a game to see its configs.</p>
    </div>
    <script>
        // Sample games data
        const games = [];

        // Fetching games data
        async function fetchGames() {
            const response = await fetch('games.json');
            const data = await response.json();
            games.push(...data);
            populateGameList();
        }

        function populateGameList() {
            const gameList = document.getElementById('gameList');
            gameList.innerHTML = '';
            games.forEach((game, index) => {
                const li = document.createElement('li');
                li.textContent = game.name;
                li.onclick = () => showGameDetails(index);
                gameList.appendChild(li);
            });
        }

        function showGameDetails(index) {
            const game = games[index];
            const gameDetails = document.getElementById('gameDetails');
            gameDetails.innerHTML = '';

            game.configs.forEach(config => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<p>GPU: ${config.gpu}</p>\n                    <p>Wine: ${config.wine}</p>\n                    <p>Resolution: ${config.resolution}</p>\n                    <p>DXVK: ${config.dxvk}</p>\n                    <p>VKD3D: ${config.vkd3d}</p>\n                    <p>FEXCore: ${config.fexcore}</p>\n                    <p>Preset: ${config.fexcore_preset}</p>\n                    <p>Env Vars: ${config.env_vars}</p>\n                    <p>Notes: ${config.notes}</p>`;
                gameDetails.appendChild(card);
            });
        }

        function filterGames() {
            const searchValue = document.getElementById('search').value.toLowerCase();
            const filteredGames = games.filter(game => game.name.toLowerCase().includes(searchValue));
            populateFilteredGameList(filteredGames);
        }

        function populateFilteredGameList(filteredGames) {
            const gameList = document.getElementById('gameList');
            gameList.innerHTML = '';
            filteredGames.forEach((game, index) => {
                const li = document.createElement('li');
                li.textContent = game.name;
                li.onclick = () => showGameDetails(index);
                gameList.appendChild(li);
            });
        }

        // Fetching GitHub API for latest version
        async function fetchLatestVersion() {
            const response = await fetch('https://api.github.com/repos/jacojayy/jacojayy.github.io/releases/latest');
            const data = await response.json();
            document.querySelector('.header h2').textContent = `Star: v${data.tag_name}`;
        }

        fetchGames();
        fetchLatestVersion();
    </script>
</body>
</html>
