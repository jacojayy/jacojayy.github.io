<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>star - Game Configurations</title>
    <style>
        body {
            background: linear-gradient(to bottom, #3e1f78, #d6d1e0);
            font-family: Arial, sans-serif;
            color: #333;
        }
        .badge {
            padding: 5px 10px;
            border-radius: 5px;
            margin: 5px;
            color: white;
        }
        .badge-perfect { background-color: #3fb950; }
        .badge-playable { background-color: #d29922; }
        .badge-decent { background-color: #fb8500; }
        .badge-broken { background-color: #f85149; }
        .config-card { border: 1px solid #ccc; padding: 15px; margin: 15px; border-radius: 5px; }
    </style>
    <script>
        async function fetchGameConfigurations() {
            const response = await fetch('games.json');
            const games = await response.json();
            const emVersion = await fetch('https://api.github.com/repos/jacojayy/star/releases/latest');
            const emulatorVersion = await emVersion.json();
            const version = emulatorVersion.tag_name;

            const configContainer = document.getElementById('configurations');
            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'config-card';
                card.innerHTML = `<h3>${game.name}</h3>
                    <p>GPU: ${game.gpu}</p>
                    <p>Wine: ${game.wine}</p>
                    <p>Resolution: ${game.resolution}</p>
                    <p>DXVK: ${game.dxvk}</p>
                    <p>VKD3D: ${game.vkd3d}</p>
                    <p>FEXCore: ${game.fexcore}</p>
                    <p>Preset: ${game.preset}</p>
                    <p>Env Vars: ${game.env_vars}</p>
                    <p>Notes: ${game.notes}</p>
                    <p>Status: <span class='badge badge-${game.status.toLowerCase()}'>${game.status}</span></p>
                    <p>Emulator Version: ${version}</p>`;
                configContainer.appendChild(card);
            });
        }
        window.onload = fetchGameConfigurations;
    <\/script>
</head>
<body>
    <h1>Game Configurations</h1>
    <div id="configurations"></div>
</body>
</html>
